    <path d="M30 75 C30 57.33 44.33 43 62 43 C79.67 43 89 52.25 92 75 C95 97.75 104.33 107 122 107 C139.67 107 154 92.67 154 75 C154 57.33 139.67 43 122 43 C104.33 43 95 52.25 92 75 C89 97.75 79.67 107 62 107 C44.33 107 30 92.67 30 75 Z"
