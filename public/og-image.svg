  <circle cx="1120" cy="500" r="60" fill="none" stroke="white" stroke-opacity="0.08" stroke-width="2"/>
  <circle cx="1050" cy="80" r="25" fill="none" stroke="#00c8e0" stroke-opacity="0.2" stroke-width="2"/>

