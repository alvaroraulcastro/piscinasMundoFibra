      <stop offset="0%" style="stop-color:#003d6b"/>
      <stop offset="50%" style="stop-color:#0057a8"/>
      <stop offset="100%" style="stop-color:#00c8e0"/>
    </linearGradient>
    <linearGradient id="wave" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#00c8e0;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#003d6b;stop-opacity:0"/>
